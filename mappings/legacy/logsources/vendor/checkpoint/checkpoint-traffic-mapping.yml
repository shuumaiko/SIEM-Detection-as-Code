# Field đã chuẩn hóa
logsource:
  category: firewall
  vendor: checkpoint
  product: vpn-1_firewall-1
  service: traffic
  category: network_traffic
  author: Anh Pham Tuan
  date: 2026-01-09

description: >
  Check Point firewall and VPN traffic logs capturing allowed network
  connections including source/destination, policy, zones and VPN context.

status: stable
version: 1.0

# Để xem danh sách đầy đủ raw input fields, xem traffic-convert-field.yaml
# Danh sách loại field (simplified view):
field_categories:
  event:
    - action
    - loguid
    - time
  network:
    - src_ip
    - dst_ip
    - src_port
    - dst_port
    - protocol
  policy:
    - rule_name
    - rule_uid
    - layer_name
  zones:
    - src_zone
    - dst_zone
  vpn:
    - vpn_peer
    - vpn_feature

# Sử dụng convert-field.yaml để mapping từ raw fields sang SIEM fields
# Sau đó sử dụng mapping dưới đây để map từ SIEM fields sang OCSF
# Flow: raw_field -> siem_field (via convert-field.yaml) -> ocsf_field (via mapping dưới)

mapping:
    # --- SIEM Field to OCSF Mapping ---
    _time: ocsf.event.time
    src_ip: ocsf.source.ip
    s_port: ocsf.source.port
    security_inzone: ocsf.source.zone
    dest_ip: ocsf.destination.ip
    service: ocsf.destination.port
    security_outzone: ocsf.destination.zone
    action: ocsf.event.action
    rule_name: ocsf.firewall.policy.name
    proto: ocsf.network.protocol
    # --- Correlation ---
    event_count: ocsf.event.count

# Reference: Để lấy raw_field -> siem_field mapping, xem traffic-convert-field.yaml
raw_field_mapping_reference: traffic-convert-field.yaml

