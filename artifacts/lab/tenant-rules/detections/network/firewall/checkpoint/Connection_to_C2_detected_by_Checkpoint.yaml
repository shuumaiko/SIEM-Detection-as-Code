title: Connection to C2 detected by Checkpoint (Rule: BLOCK WEB VIRUS 2)
id: a12b34c5-d67e-890f-g1h2-i3jklm4n5opq
status: test
description: Detects network traffic where the destination IP matches known Command and Control (C2) servers as identified by Checkpoint firewalls.
references:
    - https://www.checkpoint.com/
    - Internal: HaoDA
author: AnhPT127
date: 2026-02-06
modified: 2026-02-06
tags:
    - attack.t1071
    - attack.command_and_control
logsource:
    category: firewall
    product: generic
    service: traffic
detection:
# xử lý sau
    selection:
        dest_ip:
        # Placeholder for C2 IP addresses from Checkpoint
        # lookup FPT-C2-IPs
    filter_private_ip:
        dest_ip|cidr:
            - 10.0.0.0/8
    condition: selection and filter_private_ip
falsepositives:
    - Unknown
level: high

x_splunk_es:
    targets:
        index: firewall
        sourcetype: traffic
        schedule_cron: "0 * * * *"
        earliest: "-1h"
        latest: "now"
        notable: { enabled: true, severity: high, risk_score: 50 }
    search_query: |
        (index=$INDEX$ sourcetype=$SOURCETYPE$) rule_name=BLOCK_WEB_VIRUS_2
        | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) as Time | eval Alert_Severity="High"  
        | stats earliest(Time) as Earliest_Time latest(Time) as Latest_Time values(action) as Action values(dest_ip) as Dest_IP values(dest_port) as Dest_Port values(rule_name) as Firewall_Rule_Name count by Alert_Severity src_ip
        | rename src_ip as Source_IP