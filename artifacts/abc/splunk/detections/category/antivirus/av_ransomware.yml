x_splunk_es:
  targets:
    ingest_targets:
    - device_id: mcafee-epo
      dataset_id: mcafee-epo-syslog
      index: epav
      sourcetype: mcafee:epo:syslog
    device_id: mcafee-epo
    dataset_id: mcafee-epo-syslog
    index: epav
    sourcetype: mcafee:epo:syslog
    schedule_cron: '*/30 * * * *'
    earliest: -30m
    latest: now
    notable:
      enabled: true
      severity: critical
      risk_score: 90
    enabled: true
  search_query: |-
    ((index=epav sourcetype=mcafee:epo:syslog)) signature IN ("*BlackWorm*", "*Chaos*", "*Cobra*", "*ContiCrypt*", "*Crypter*", "*CRYPTES*", "*Cryptor*", "*CylanCrypt*", "*DelShad*", "*Destructor*", "*Filecoder*", "*GandCrab*", "*GrandCrab*", "*Haperlock*", "*Hiddentear*", "*HydraCrypt*", "*Krypt*", "*Lockbit*", "*Locker*", "*Mallox*", "*Phobos*", "*Ransom*", "*Ryuk*", "*Ryzerlo*", "*Stopcrypt*", "*Tescrypt*", "*TeslaCrypt*", "*WannaCry*", "*Xorist*")
    | convert timeformat="%Y-%m-%d %H:%M:00" ctime(_time) as Time
    | eval Alert_Severity="Critical"
    | stats values(TargetName) as file_name values(TargetPath) as file_path values(file_hash) as file_hash values(dest_host) as hostname values(dest_ip) as ipv4 values(user) as user values(action) as action_taken count by Alert_Severity Time signature
