    device_id: mcafee-epo
    dataset_id: mcafee-epo-syslog
    index: epav
    sourcetype: mcafee:epo:syslog
    schedule_cron: '*/30 * * * *'
    earliest: -30m
    latest: now
    notable:
      enabled: true
      severity: high
      risk_score: 60
    enabled: true
  search_query: |-
    ((index=epav sourcetype=mcafee:epo:syslog)) (signature IN ("ASP.*", "IIS/BackDoor*", "JAVA/Backdoor*", "JSP.*", "Perl.*", "PHP.*", "Troj/ASP*", "Troj/JSP*", "Troj/PHP*", "VBS/Uxor*") OR signature IN ("*ASP_*", "*ASP:*", "*ASP.Agent*", "*ASP/*", "*Aspdoor*", "*ASPXSpy*", "*Backdoor.ASP*", "*Backdoor.Java*", "*Backdoor.JSP*", "*Backdoor.PHP*", "*Backdoor.VBS*", "*Backdoor/ASP*", "*Backdoor/Java*", "*Backdoor/JSP*", "*Backdoor/PHP*", "*Backdoor/VBS*", "*C99shell*", "*Chopper*", "*filebrowser*", "*JSP_*", "*JSP:*", "*JSP.Agent*", "*JSP/*", "*Perl:*", "*Perl/*", "*PHP_*", "*PHP:*", "*PHP.Agent*", "*PHP/*", "*PHPShell*", "*PShlSpy*", "*SinoChoper*", "*Trojan.ASP*", "*Trojan.JSP*", "*Trojan.PHP*", "*Trojan.VBS*", "*VBS.Agent*", "*VBS/Agent*", "*Webshell*"))
    | bucket _time span=15m
    | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) as Time
    | eval Alert_Severity="High"
    | stats values(action) as action_taken values(TargetName) as file_name values(TargetPath) as file_path values(file_hash) as file_hash values(dest_host) as hostname values(source_process_name) as processname values(signature) as threat_name values(user) as user count by Alert_Severity Time dest_ip
    | fillnull value=N/A action_taken file_name file_path file_hash processname user
