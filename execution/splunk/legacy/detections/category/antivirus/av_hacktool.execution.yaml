title: Antivirus Hacktool Detection
id: fa0c05b6-8ad3-468d-8231-c1cbccb64fba
status: stable
description: |
    Detects a highly relevant Antivirus alert that reports a hack tool or other attack tool.
    This event must not be ignored just because the AV has blocked the malware but investigate, how it came there in the first place.
references:
    - source_ref: sigma:fa0c05b6-8ad3-468d-8231-c1cbccb64fba
author: Florian Roth (Nextron Systems), Arnim Rupp
date: 2021-08-16
modified: 2024-11-02
logsource:
    category: antivirus
    product: any
    service: any
correlation:
    type: event_count
    rules:
        - av_hacktool
    group-by:
        - host
    timespan: 15m
    condition:
        gt: 0
fields:
    - _time
    - host
    - Signature
    - file_name
    - file_hash
    - action_taken

x_query:
    splunk: |
        index=$index$ sourcetype=$sourcetype$ AND Signature IN ("ATK/*", "Exploit.Script.CVE*", "HKTL*", "HTOOL*", "PWS.*", "PWSX*", "SecurityTool*") OR Signature CONTAINS ("Adfind", "Brutel", "BruteR", "Cobalt", "COBEACON", "Cometer", "DumpCreds", "FastReverseProxy", "Hacktool", "Havoc", "Impacket", "Keylogger", "Koadic", "Mimikatz", "Nighthawk", "PentestPowerShell", "Potato", "PowerSploit", "PowerSSH", "PshlSpy", "PSWTool", "PWCrack", "PWDump", "Rozena", "Rusthound", "Sbelt", "Seatbelt", "SecurityTool", "SharpDump") 
        | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) AS Time 
        | eval Alert_Severity="High"  
        | bin _time span=15m
        | stats count as event_count by _time host
        | search event_count > 0 
        | table _time,host,Signature,file_name,file_hash,action_taken,event_count