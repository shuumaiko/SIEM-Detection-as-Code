schema_version: 1.0
tenant_id: xyz
siem_id: splunk
device_id: mcafee-epo

description: >
  Canonical-field to tenant SIEM-field mapping for McAfee ePO antivirus syslog
  events in tenant xyz. Built from sampled rows in mcafee-log.csv and aligned
  to the antivirus detection pack under rules/detections/category/antivirus.

field_mapping:
  time: _time
  canonical.event.action: action
  malware.name: signature
  file.name: TargetName
  file.path: TargetPath
  file.hashes: file_hash
  device.hostname: dest_host
  device.ip: dest_ip
  user.name: user
  process.name: source_process_name

