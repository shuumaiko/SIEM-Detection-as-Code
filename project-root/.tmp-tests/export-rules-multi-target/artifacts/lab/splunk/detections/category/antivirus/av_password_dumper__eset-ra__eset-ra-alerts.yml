  search_query: |-
    ((index=epav sourcetype=eset:ra)) (threat_name="PWS*" OR threat_name IN ("*Certify*", "*DCSync*", "*DumpCreds*", "*DumpLsass*", "*DumpPert*", "*HTool/WCE*", "*Kekeo*", "*Lazagne*", "*LsassDump*", "*Mimikatz*", "*MultiDump*", "*Nanodump*", "*NativeDump*", "*Outflank*", "*PShlSpy*", "*PSWTool*", "*PWCrack*", "*PWDump*", "*PWS.*", "*PWSX*", "*pypykatz*", "*Rubeus*", "*SafetyKatz*", "*SecurityTool*", "*SharpChrome*", "*SharpDPAPI*", "*SharpDump*", "*SharpKatz*", "*SharpS.*", "*ShpKatz*", "*TrickDump*"))
    | bucket _time span=15m
    | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) as Time
    | eval Alert_Severity="High"
    | stats values(action_taken) as action_taken values(file_name) as file_name values(file_path) as file_path values(file_hash) as file_hash values(hostname) as hostname values(processname) as processname values(threat_name) as threat_name values(user) as user count by Alert_Severity Time ipv4
    | fillnull value=N/A action_taken file_name file_path file_hash processname user
