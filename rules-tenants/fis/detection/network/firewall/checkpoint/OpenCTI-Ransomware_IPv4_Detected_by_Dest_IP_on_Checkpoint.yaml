title: OpenCTI - Ransomware IPv4 Detected by Dest IP on Checkpoint
id: h83m31l7-aam5-b47h-i7j0-i5jkl93hikjh
status: deprecated
description: Detects network traffic where the destination IP matches known Ransomware IPv4 addresses as identified by OpenCTI and logged by Checkpoint firewalls.
references: 
    - https://www.opencti.io/
    - Internal: HaoDA4
author: AnhPT127
date: 2026-02-06
modified: 2026-02-06
tags:
    - attack.t1486
    - attack.ransomware
logsource:
    category: firewall
    product: checkpoint
    service: traffic
detection:
    selection:
        dest_ip:
        # Placeholder for Ransomware IPv4 from OpenCTI
        # lookup FPT-Ransomware-IPv4
    condition: selection
falsepositives:
    - Unknown
level: high

x_splunk_es:
    targets:
        index: firewall
        sourcetype: traffic
        schedule_cron: "0 * * * *"
        earliest: "-1h"
        latest: "now"
        notable: { enabled: true, severity: high, risk_score: 50 }
    search_query: |
        (index=$INDEX$ sourcetype=$SOURCETYPE$) dest_ip=* (src_ip="10.0.0.0/8" OR src_ip="172.16.0.0/12" OR src_ip="192.168.0.0/16")
        | search
            [| inputlookup FPT-Ransomware-IPv4 | rename value as dest_ip | fields dest_ip]
        | bucket _time span=1h
        | convert timeformat="%m/%d/%Y %H:%M:%S" ctime(_time) AS Time | eval Alert_Severity="Medium" 
        | stats values(proto) as Protocol_Number values(dest_ip) as Dest_IP , values(src_user) as Source_User, values(action) as Action, values(attack) as Attack_Info count by Alert_Severity Time src_ip
        | rename src_ip as src_ip
        | fillnull value=N/A Protocol_Number Dest_IP Source_User Action Attack_Info