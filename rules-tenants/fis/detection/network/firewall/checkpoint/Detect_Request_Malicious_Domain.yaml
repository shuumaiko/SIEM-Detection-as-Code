title: Detect Request Malicious Domain
id: a123b456-c789-012d-ef34-gh567890ijkl
status: test
description: Detects network traffic where the destination domain matches known malicious domains as identified by Checkpoint firewalls.
references:
    - https://www.checkpoint.com/
    - Internal: HaoDA
author: AnhPT127
date: 2026-02-06
modified: 2026-02-06
tags:
    - attack.t1071
    - attack.command_and_control
logsource:
    category: firewall
    product: generic
    service: traffic
detection:
# xử lý sau
    selection:
        dest_domain:
        # Placeholder for malicious domains from Checkpoint
        # lookup FPT-Malicious-Domains
    condition: selection
falsepositives:
    - Unknown
level: high

x_splunk_es:
    targets:
        index: firewall
        sourcetype: traffic
        schedule_cron: "0 * * * *"
        earliest: "-1h"
        latest: "now"
        notable: { enabled: true, severity: high, risk_score: 50 }
    search_query: |
        (index=$INDEX$ sourcetype=$SOURCETYPE$) dst_domain_name=*
        | search [| inputlookup maltrail_malware_domain.csv]
        | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) as Time | eval Alert_Severity="High"  
        | stats values(dest_ip) as Dest_IP values(dst_domain_name) as Dst_Domain_Name values(action) as Action values(sourcetype) as "Source Type" count by Alert_Severity Time src_ip