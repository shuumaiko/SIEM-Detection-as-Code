title: Antivirus Hacktool Detection
rule_id: fa0c05b6-8ad3-468d-8231-c1cbccb64fba
solution: splunk
status: stable
author: AnhPT127
date: 2021-08-16
modified: 2024-11-02

correlation:
    type: event_count
    rules:
        - av_hacktool
    group-by:
        - host
    timespan: 15m
    condition:
        gt: 0
fields:
    - _time
    - host
    - Signature
    - file_name
    - file_hash
    - action_taken

x_query:
    splunk: |
        index=$index$ sourcetype=$sourcetype$ AND Signature IN ("ATK/*", "Exploit.Script.CVE*", "HKTL*", "HTOOL*", "PWS.*", "PWSX*", "SecurityTool*") OR Signature CONTAINS ("Adfind", "Brutel", "BruteR", "Cobalt", "COBEACON", "Cometer", "DumpCreds", "FastReverseProxy", "Hacktool", "Havoc", "Impacket", "Keylogger", "Koadic", "Mimikatz", "Nighthawk", "PentestPowerShell", "Potato", "PowerSploit", "PowerSSH", "PshlSpy", "PSWTool", "PWCrack", "PWDump", "Rozena", "Rusthound", "Sbelt", "Seatbelt", "SecurityTool", "SharpDump") 
        | convert timeformat="%Y/%m/%d %H:%M:%S" ctime(_time) AS Time 
        | eval Alert_Severity="High"  
        | bin _time span=15m
        | stats count as event_count by _time host
        | search event_count > 0 
        | table _time,host,Signature,file_name,file_hash,action_taken,event_count